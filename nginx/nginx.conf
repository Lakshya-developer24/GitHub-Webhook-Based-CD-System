events {}

http {
    include /etc/nginx/conf.d/*.conf;

    server {
        listen 80;

        location / {
            proxy_pass http://platform-frontend:3000;
        }

        location /api/ {
            proxy_pass http://platform-backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
