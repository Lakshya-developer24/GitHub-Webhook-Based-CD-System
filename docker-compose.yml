version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    container_name: platform-frontend
    networks:
      - platform-network

  backend:
    build:
      context: ./backend
    container_name: platform-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    networks:
      - platform-network
    depends_on:
      - redis

  worker:
    build:
      context: ./worker
    container_name: platform-worker
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - PYTHONUNBUFFERED=1
    networks:
      - platform-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./repos:/app/repos
      - ./nginx/conf.d:/app/nginx/conf.d
    depends_on:
      - redis
      - backend

  redis:
    image: redis:7-alpine
    container_name: platform-redis
    ports:
      - "6379:6379"
    networks:
      - platform-network

  nginx:
    image: nginx:alpine
    container_name: platform-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d
    networks:
      - platform-network
    depends_on:
      - frontend
      - backend

networks:
  platform-network:
    driver: bridge
